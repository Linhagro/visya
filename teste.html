<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Teste mínimo Three.js - Caminhão</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #020617;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #f9fafb;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #wrap {
      width: 100%;
      max-width: 900px;
      height: 80vh;
      border-radius: 12px;
      border: 1px solid #1f2937;
      background: radial-gradient(circle at top, #111827, #020617 55%, #000);
      box-shadow: 0 30px 80px rgba(0,0,0,0.9);
      position: relative;
      overflow: hidden;
    }
    #canvas-container {
      position: absolute;
      inset: 0;
    }
    #three-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .label-item {
      position: absolute;
      transform: translate(-50%, -50%);
      font-size: 11px;
      color: #e5e7eb;
      background: rgba(15,23,42,0.98);
      padding: 3px 7px;
      border-radius: 999px;
      border: 1px solid rgba(34,197,94,0.75);
      white-space: nowrap;
    }
    .label-line {
      position: absolute;
      overflow: visible;
    }
    .label-line svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="canvas-container">
      <canvas id="three-canvas"></canvas>
      <div id="overlay"></div>
    </div>
  </div>

  <!-- Somente o THREE local, na mesma pasta -->
  <script src="./three.min.js"></script>

  <script>
    console.log("window.THREE local =", window.THREE);

    if (!window.THREE) {
      alert("Three.js local não carregou. Confirme se three.min.js está na MESMA pasta deste teste.html.");
    } else {
      init();
    }

    function init() {
      const canvas = document.getElementById("three-canvas");
      const overlay = document.getElementById("overlay");
      const container = document.getElementById("canvas-container");

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x020617);

      const camera = new THREE.PerspectiveCamera(
        45,
        container.clientWidth / container.clientHeight,
        0.1,
        100
      );
      camera.position.set(8, 4, 8);

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(container.clientWidth, container.clientHeight);

      const hemi = new THREE.HemisphereLight(0xffffff, 0x111827, 0.7);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 1.0);
      dir.position.set(5, 8, 4);
      scene.add(dir);

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(30, 30),
        new THREE.MeshStandardMaterial({ color: 0x020617, roughness: 0.9 })
      );
      ground.rotation.x = -Math.PI / 2;
      scene.add(ground);

      const truckGroup = new THREE.Group();
      scene.add(truckGroup);

      const cab = new THREE.Mesh(
        new THREE.BoxGeometry(2, 2, 2),
        new THREE.MeshStandardMaterial({ color: 0x0f172a })
      );
      cab.position.set(-3, 1, 0);
      truckGroup.add(cab);

      const box = new THREE.Mesh(
        new THREE.BoxGeometry(6, 2.4, 2.4),
        new THREE.MeshStandardMaterial({ color: 0x1f2937, metalness: 0.8, roughness: 0.3 })
      );
      box.position.set(1.0, 1.4, 0);
      truckGroup.add(box);

      const produto = new THREE.Mesh(
        new THREE.BoxGeometry(1.0, 1.0, 1.0),
        new THREE.MeshStandardMaterial({ color: 0x22c55e })
      );
      produto.position.set(1.0, 1.0, 0);
      truckGroup.add(produto);

      const label = document.createElement("div");
      label.className = "label-item";
      label.textContent = "Pedido 1016 - Cliente A";
      overlay.appendChild(label);

      const lineWrapper = document.createElement("div");
      lineWrapper.className = "label-line";
      const svgNS = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(svgNS, "svg");
      const line = document.createElementNS(svgNS, "line");
      line.setAttribute("stroke", "rgba(148,163,184,0.98)");
      line.setAttribute("stroke-width", "1.2");
      svg.appendChild(line);
      lineWrapper.appendChild(svg);
      overlay.appendChild(lineWrapper);

      function updateLabel() {
        const width = container.clientWidth;
        const height = container.clientHeight;

        const worldPos = new THREE.Vector3();
        produto.getWorldPosition(worldPos);
        const projected = worldPos.clone().project(camera);

        const x = (projected.x * 0.5 + 0.5) * width;
        const y = (-projected.y * 0.5 + 0.5) * height;

        const labelX = x + width * 0.2;
        const labelY = y - 10;

        label.style.left = labelX + "px";
        label.style.top  = labelY + "px";

        const x1 = x, y1 = y, x2 = labelX, y2 = labelY;
        const minX = Math.min(x1, x2);
        const minY = Math.min(y1, y2);
        const w = Math.abs(x2 - x1) || 1;
        const h = Math.abs(y2 - y1) || 1;

        lineWrapper.style.left = minX + "px";
        lineWrapper.style.top  = minY + "px";
        lineWrapper.style.width = w + "px";
        lineWrapper.style.height = h + "px";
        svg.setAttribute("viewBox", `0 0 ${w} ${h}`);

        const lx1 = x1 < x2 ? 0 : w;
        const lx2 = x1 < x2 ? w : 0;
        const ly1 = y1 < y2 ? 0 : h;
        const ly2 = y1 < y2 ? h : 0;
        line.setAttribute("x1", lx1);
        line.setAttribute("y1", ly1);
        line.setAttribute("x2", lx2);
        line.setAttribute("y2", ly2);
      }

      function onResize() {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      }
      window.addEventListener("resize", onResize);
      onResize();

      // animação simples
      function animate() {
        requestAnimationFrame(animate);
        // gira um pouco o caminhão pra dar sensação 3D
        truckGroup.rotation.y += 0.003;
        renderer.render(scene, camera);
        updateLabel();
      }
      animate();
    }
  </script>
</body>
</html>
