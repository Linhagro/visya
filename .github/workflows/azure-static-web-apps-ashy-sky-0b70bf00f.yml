name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    env:
      SKIP_DEPLOY_ON_MISSING_SECRETS: true # Nao quebra o job se o secret estiver ausente
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }} # Token do Azure Static Web App
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Token padrao do GitHub
          action: "upload"
          app_location: "/" # Arquivos finais na raiz do repositorio
          output_location: "" # Ja esta buildado, sem pasta de output separada
          skip_app_build: true # Pula o build, app ja esta pronto
